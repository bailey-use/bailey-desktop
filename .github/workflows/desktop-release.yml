name: Desktop Developer Prerelease

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            bundle: dmg
            artifact: bailey-macos
            asset_path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows x64
            os: windows-latest
            bundle: nsis
            artifact: bailey-windows-x64
            asset_path: desktop/src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Checkout pinned Bailey Local Tools runtime
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: bailey-use/bailey-use
          ref: e6fdb4985686557a32481827b1ead0afa98d5d8d
          path: bailey-use-runtime
          ssh-key: ${{ secrets.BAILEY_USE_DEPLOY_KEY }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
        with:
          components: rustfmt, clippy

      # This privileged workflow intentionally does not restore a build cache.
      # `workflow_run` must not consume cache state written by untrusted runs.

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Package platform computer-use runtime
        working-directory: bailey-use-runtime
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            npm run package:windows-computer-use
          else
            npm run package:macos-computer-use
          fi

      - name: Build installer
        working-directory: desktop
        env:
          BAILEY_USE_SOURCE_DIR: ${{ github.workspace }}/bailey-use-runtime
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Generate installer checksum
        shell: bash
        run: |
          asset=$(compgen -G '${{ matrix.asset_path }}' | head -1)
          test -n "$asset"
          asset_dir=$(dirname "$asset")
          asset_name=$(basename "$asset")
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$asset_dir" && sha256sum "$asset_name" > "$asset_name.sha256")
          else
            (cd "$asset_dir" && shasum -a 256 "$asset_name" > "$asset_name.sha256")
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.asset_path }}
            ${{ matrix.asset_path }}.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Prerelease
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create prerelease for this main commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          tag="desktop-build-${RUN_NUMBER}.${RUN_ATTEMPT}"
          short_sha="${COMMIT_SHA:0:7}"
          release_created=0
          cleanup_failed_draft() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$release_created" -eq 1 ]; then
              if [ "$(gh release view "$tag" --repo "$REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || true)" = "true" ]; then
                gh release delete "$tag" --repo "$REPOSITORY" --yes --cleanup-tag || true
              fi
            fi
            exit "$status"
          }
          trap cleanup_failed_draft EXIT

          mapfile -t assets < <(find release-assets -type f -print | sort)
          dmg_count=$(find release-assets -type f -name '*.dmg' | wc -l)
          exe_count=$(find release-assets -type f -name '*.exe' | wc -l)
          checksum_count=$(find release-assets -type f -name '*.sha256' | wc -l)
          if [ "${#assets[@]}" -ne 4 ] || [ "$dmg_count" -ne 1 ] || [ "$exe_count" -ne 1 ] || [ "$checksum_count" -ne 2 ]; then
            echo "Expected two installers and two checksums; found ${#assets[@]} total" >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; refusing to replace immutable installer assets" >&2
            exit 1
          fi
          gh release create "$tag" \
            --repo "$REPOSITORY" \
            --target "$COMMIT_SHA" \
            --draft \
            --prerelease \
            --title "Bailey Desktop build ${RUN_NUMBER}.${RUN_ATTEMPT} (${short_sha})" \
            --notes "Automated development build from main commit ${COMMIT_SHA}. macOS is ad-hoc signed but not notarized; Windows is unsigned."
          release_created=1
          gh release upload "$tag" "${assets[@]}" --repo "$REPOSITORY"
          uploaded=$(gh api "repos/$REPOSITORY/releases/tags/$tag" --jq '.assets | length')
          if [ "$uploaded" -ne 4 ]; then
            echo "Expected 4 immutable assets in the draft release; found $uploaded" >&2
            exit 1
          fi
          gh release edit "$tag" --repo "$REPOSITORY" --draft=false --prerelease
          release_created=0
