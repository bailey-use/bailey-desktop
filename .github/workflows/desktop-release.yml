name: Desktop Developer Prerelease

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            bundle: dmg
            artifact: bailey-macos
            asset_path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows x64
            os: windows-latest
            bundle: nsis
            artifact: bailey-windows-x64
            asset_path: desktop/src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Checkout pinned Bailey Local Tools runtime
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: bailey-use/bailey-use
          ref: 5aea901088ab3240398831e65b1a3fcfeae11a99
          path: bailey-use-runtime
          ssh-key: ${{ secrets.BAILEY_USE_DEPLOY_KEY }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
        with:
          components: rustfmt, clippy

      # This privileged workflow intentionally does not restore a build cache.
      # `workflow_run` must not consume cache state written by untrusted runs.

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Package platform computer-use runtime
        working-directory: bailey-use-runtime
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            npm run package:windows-computer-use
          else
            npm run package:macos-computer-use
          fi

      - name: Build installer
        working-directory: desktop
        env:
          BAILEY_USE_SOURCE_DIR: ${{ github.workspace }}/bailey-use-runtime
        run: pnpm tauri build --bundles ${{ matrix.bundle }}

      - name: Generate installer checksum
        shell: bash
        run: |
          asset=$(compgen -G '${{ matrix.asset_path }}' | head -1)
          test -n "$asset"
          asset_dir=$(dirname "$asset")
          asset_name=$(basename "$asset")
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$asset_dir" && sha256sum "$asset_name" > "$asset_name.sha256")
          else
            (cd "$asset_dir" && shasum -a 256 "$asset_name" > "$asset_name.sha256")
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.asset_path }}
            ${{ matrix.asset_path }}.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Prerelease
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create prerelease for this main commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: |
          tag="desktop-build-${RUN_NUMBER}.${RUN_ATTEMPT}"
          short_sha="${COMMIT_SHA:0:7}"
          title="Bailey Desktop build ${RUN_NUMBER}.${RUN_ATTEMPT} (${short_sha})"
          cleanup_armed=0
          cleanup_failed_release() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$cleanup_armed" -eq 1 ]; then
              if ! release_inventory=$(gh api --paginate "repos/$REPOSITORY/releases?per_page=100"); then
                echo "::warning::Unable to inspect releases; skipping cleanup"
                exit "$status"
              fi
              if ! published_id=$(printf '%s\n' "$release_inventory" \
                | jq -r --arg tag "$tag" '.[] | select(.tag_name == $tag and .draft == false) | .id' \
                | head -n 1); then
                echo "::warning::Unable to verify release state; skipping cleanup"
                exit "$status"
              fi
              if [ -n "$published_id" ]; then
                echo "::warning::Release $tag was already published; leaving it intact"
              else
                if ! draft_id_lines=$(printf '%s\n' "$release_inventory" \
                  | jq -r --arg tag "$tag" --arg title "$title" \
                    '.[] | select(.tag_name == $tag and .name == $title and .draft == true) | .id'); then
                  echo "::warning::Unable to identify draft releases; skipping cleanup"
                  exit "$status"
                fi
                mapfile -t draft_ids <<< "$draft_id_lines"
                cleanup_safe=1
                for release_id in "${draft_ids[@]}"; do
                  if [ -n "$release_id" ]; then
                    if ! gh api --method DELETE "repos/$REPOSITORY/releases/$release_id"; then
                      echo "::warning::Unable to delete draft release $release_id; preserving tag"
                      cleanup_safe=0
                    fi
                  fi
                done
                if [ "$cleanup_safe" -eq 1 ]; then
                  if ! tag_sha=$(gh api "repos/$REPOSITORY/git/matching-refs/tags/$tag" \
                    --jq ".[] | select(.ref == \"refs/tags/$tag\") | .object.sha"); then
                    echo "::warning::Unable to inspect tag $tag; preserving it"
                  elif [ "$tag_sha" = "$COMMIT_SHA" ]; then
                    gh api --method DELETE "repos/$REPOSITORY/git/refs/tags/$tag" \
                      || echo "::warning::Unable to delete tag $tag"
                  fi
                fi
              fi
            fi
            exit "$status"
          }
          trap cleanup_failed_release EXIT

          mapfile -t assets < <(find release-assets -type f -print | sort)
          dmg_count=$(find release-assets -type f -name '*.dmg' | wc -l)
          exe_count=$(find release-assets -type f -name '*.exe' | wc -l)
          checksum_count=$(find release-assets -type f -name '*.sha256' | wc -l)
          basename_count=$(printf '%s\n' "${assets[@]##*/}" | sort -u | wc -l)
          if [ "${#assets[@]}" -ne 4 ] || [ "$dmg_count" -ne 1 ] || [ "$exe_count" -ne 1 ] || [ "$checksum_count" -ne 2 ] || [ "$basename_count" -ne 4 ]; then
            echo "Expected two installers and two checksums; found ${#assets[@]} total" >&2
            exit 1
          fi
          for installer in release-assets/*.dmg release-assets/*.exe; do
            if [ ! -f "$installer.sha256" ]; then
              echo "Missing checksum for $installer" >&2
              exit 1
            fi
          done
          (cd release-assets && sha256sum --check --strict -- ./*.sha256)
          release_inventory=$(gh api --paginate "repos/$REPOSITORY/releases?per_page=100")
          existing_release_ids=$(printf '%s\n' "$release_inventory" \
            | jq -r --arg tag "$tag" --arg title "$title" \
              '.[] | select(.tag_name == $tag or .name == $title) | .id')
          existing_tag_sha=$(gh api "repos/$REPOSITORY/git/matching-refs/tags/$tag" \
            --jq ".[] | select(.ref == \"refs/tags/$tag\") | .object.sha")
          if [ -n "$existing_release_ids" ] || [ -n "$existing_tag_sha" ]; then
            echo "Release or tag $tag already exists; refusing to replace immutable installer assets" >&2
            exit 1
          fi
          cleanup_armed=1
          gh release create "$tag" "${assets[@]}" \
            --repo "$REPOSITORY" \
            --target "$COMMIT_SHA" \
            --draft \
            --prerelease \
            --latest=false \
            --title "$title" \
            --notes "Automated development build from main commit ${COMMIT_SHA}. macOS is ad-hoc signed but not notarized; Windows is unsigned."

          # Draft releases are not addressable by tag, so all remaining
          # verification and publication must use the REST release ID.
          release_inventory=$(gh api --paginate "repos/$REPOSITORY/releases?per_page=100")
          release_id_lines=$(printf '%s\n' "$release_inventory" \
            | jq -r --arg tag "$tag" --arg title "$title" \
              '.[] | select(.tag_name == $tag and .name == $title and .draft == true) | .id')
          release_id_count=$(printf '%s\n' "$release_id_lines" | sed '/^$/d' | wc -l)
          if [ "$release_id_count" -ne 1 ]; then
            echo "Expected one draft release for $tag; found $release_id_count" >&2
            exit 1
          fi
          release_id=$(printf '%s\n' "$release_id_lines" | sed '/^$/d' | head -n 1)
          draft_state=$(gh api "repos/$REPOSITORY/releases/$release_id" \
            --jq '[(.assets | length), .draft, .prerelease, .tag_name, .target_commitish] | @tsv')
          IFS=$'\t' read -r uploaded draft prerelease draft_tag draft_target <<< "$draft_state"
          if [ "$uploaded" -ne 4 ] || [ "$draft" != "true" ] || [ "$prerelease" != "true" ] \
            || [ "$draft_tag" != "$tag" ] || [ "$draft_target" != "$COMMIT_SHA" ]; then
            echo "Draft release verification failed: assets=$uploaded draft=$draft prerelease=$prerelease tag=$draft_tag target=$draft_target" >&2
            exit 1
          fi

          published_state=$(gh api --method PATCH "repos/$REPOSITORY/releases/$release_id" \
            -F draft=false \
            -F prerelease=true \
            --jq '[(.assets | length), .draft, .prerelease, .tag_name, .target_commitish] | @tsv')
          IFS=$'\t' read -r uploaded draft prerelease published_tag published_target <<< "$published_state"
          if [ "$uploaded" -ne 4 ] || [ "$draft" != "false" ] || [ "$prerelease" != "true" ] \
            || [ "$published_tag" != "$tag" ] || [ "$published_target" != "$COMMIT_SHA" ]; then
            echo "Published release verification failed: assets=$uploaded draft=$draft prerelease=$prerelease tag=$published_tag target=$published_target" >&2
            exit 1
          fi
          cleanup_armed=0
