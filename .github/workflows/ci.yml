name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  desktop:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: dmg
          - os: windows-latest
            bundle: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Checkout pinned Bailey Local Tools runtime
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: bailey-use/bailey-use
          ref: e6fdb4985686557a32481827b1ead0afa98d5d8d
          path: bailey-use-runtime
          ssh-key: ${{ secrets.BAILEY_USE_DEPLOY_KEY }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            desktop/src-tauri -> target

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install desktop dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Package platform computer-use runtime
        working-directory: bailey-use-runtime
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            npm run package:windows-computer-use
          else
            npm run package:macos-computer-use
          fi

      - name: Verify desktop installer
        working-directory: desktop
        env:
          BAILEY_USE_SOURCE_DIR: ${{ github.workspace }}/bailey-use-runtime
        run: pnpm tauri build --bundles ${{ matrix.bundle }}
